name: publish

# Container-image publish pipeline. Triggers ONLY on v*.*.* tags — there
# is no workflow_dispatch, so every published image is anchored to a git
# tag that is reachable from main.
#
# Pipeline:
#   1. guard    -- reject tags not reachable from main
#   2. validate -- reuse _validate.yml (hadolint + FROM-digest-pin / gofmt
#                  / go vet / golangci-lint / go test / govulncheck /
#                  cosign verify-base / Trivy block + full SARIF)
#   3. build    -- ONE job per platform on a NATIVE runner (amd64 on
#                  ubuntu-24.04, arm64 on ubuntu-24.04-arm), built and
#                  pushed by digest, each carrying BuildKit's OCI SBOM +
#                  provenance attestations. Runs in parallel, so wall-clock
#                  is the slowest single platform — not the sum, and NOT
#                  arm64-under-QEMU.
#   4. merge    -- assemble the per-platform digests into one manifest list
#                  with `docker buildx imagetools create` (this preserves
#                  the per-platform OCI attestations), tag + push it, then
#                  cosign-sign and emit a Sigstore-signed SLSA provenance
#                  over the final index digest.
#   5. verify-published-image
#               -- smoke test: re-verify the signature and the Sigstore
#                  provenance against this workflow's identity.
#
# Each stage gates the next. govulncheck (reachability-aware Go CVE scan)
# also lives in its own workflow on a go.mod / go.sum path filter plus a
# daily schedule, independent of this pipeline.
#
# Two complementary attestations ride on the published image:
#   - OCI BuildKit (sbom: true + provenance: mode=max), readable via
#     `docker buildx imagetools inspect` — rich build detail + SBOM.
#   - Sigstore (actions/attest-build-provenance), verifiable via
#     `gh attestation verify` — cryptographic, identity-bound provenance.
#
# The published image ships only the worker BINARY. The heavy RustDesk
# build toolchain the worker shells out to at run time is NOT baked in; it
# is expected to be provided by the runtime environment.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Top-level permissions are the least-privileged default; each job
# elevates only what it needs.
permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Reject tags that don't point at a commit reachable from main.
  # Protects against tagging a random feature branch or arbitrary SHA
  # and thereby skipping the PR / main CI gate entirely.
  # -------------------------------------------------------------------
  guard:
    name: Tag must be on main
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is an ancestor of main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME ($GITHUB_SHA) is not reachable from origin/main."
            echo "::error::Only tag commits that are already on main (and have passed CI)."
            exit 1
          fi
          echo "OK: tag $GITHUB_REF_NAME is on main."

  # -------------------------------------------------------------------
  # Reuse the same validation pipeline as ci.yml against the tagged
  # commit, so the gate is identical to what a PR sees -- no drift.
  # -------------------------------------------------------------------
  validate:
    needs: guard
    uses: ./.github/workflows/_validate.yml
    permissions:
      contents: read
      security-events: write

  # -------------------------------------------------------------------
  # Per-platform build on a native runner, pushed by digest. No QEMU:
  # amd64 builds on ubuntu-24.04, arm64 on the native ubuntu-24.04-arm
  # runner. The two run in parallel. `push-by-digest=true` pushes an
  # untagged, content-addressed single-platform image (an OCI index
  # carrying the OCI SBOM/provenance attestations); the merge job
  # stitches the digests into the final tagged manifest list.
  # -------------------------------------------------------------------
  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Compute platform slug
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "PLATFORM_SLUG=${PLATFORM//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels only — push-by-digest images are untagged; tags are applied
      # on the merged manifest list in the merge job.
      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Per-platform cache scopes so the two runners don't clobber each
      # other's gha cache. sbom + provenance attach BuildKit's OCI
      # attestations; imagetools create in the merge job carries them into
      # the final manifest list.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.PLATFORM_SLUG }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_SLUG }}
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  # Assemble the per-platform digests into one tagged manifest list,
  # then sign + attest the final index digest.
  # -------------------------------------------------------------------
  merge:
    name: Merge, sign and attest manifest list
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write       # keyless cosign signing via GitHub OIDC
      attestations: write   # actions/attest-build-provenance
    outputs:
      digest: ${{ steps.merged.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # latest=true (not =auto): if a v*.*.* tag is ever cut as a semver
      # prerelease, latest=auto would never promote it to :latest. We
      # explicitly want :latest to track the newest published image.
      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
          flavor: |
            latest=true

      # imagetools create (NOT `docker manifest create`) is what carries
      # the per-platform OCI SBOM/provenance attestations into the merged
      # manifest list. Tags come from metadata-action; sources are the
      # per-platform digests dropped as filenames in the digests dir.
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${REGISTRY}/${IMAGE_NAME}@sha256:%s " *)

      - name: Capture merged index digest
        id: merged
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          digest=$(docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${VERSION}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "Merged index digest: $digest"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
          IMAGE_DIGEST_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.merged.outputs.digest }}
        run: |
          set -euo pipefail
          echo "Signing $IMAGE_DIGEST_REF"
          cosign sign "$IMAGE_DIGEST_REF"

      # Sigstore-signed SLSA provenance over the merged index digest, so
      # the attestation covers the whole manifest list. Verifiable with
      # `gh attestation verify` (the OCI BuildKit provenance from the build
      # jobs is separate and not Sigstore-signed).
      - name: Attest build provenance (Sigstore-signed SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.merged.outputs.digest }}
          push-to-registry: true

  # -------------------------------------------------------------------
  # Smoke test: re-verify the signature and the Sigstore SLSA provenance
  # we just produced against the expected workflow identity. Catches
  # signing / attestation misconfiguration here rather than downstream.
  # -------------------------------------------------------------------
  verify-published-image:
    name: Verify our own signature and provenance
    runs-on: ubuntu-24.04
    needs: merge
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signature
        env:
          IMAGE_DIGEST_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.merge.outputs.digest }}
          # Pin the signer identity to publish.yml specifically — the merge
          # job above is the only thing that signs, so its OIDC identity is
          # always .../publish.yml@refs/tags/<tag>. A broad workflows/.+
          # would accept a signature minted by ANY workflow file at a v-tag.
          IDENTITY_REGEXP: ^https://github\.com/${{ github.repository }}/\.github/workflows/publish\.yml@refs/tags/v.+
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
            --certificate-identity-regexp="$IDENTITY_REGEXP" \
            "$IMAGE_DIGEST_REF"

      # The verifiable provenance is the Sigstore one from
      # actions/attest-build-provenance, so verify with `gh attestation
      # verify` — NOT `cosign verify-attestation`. --signer-workflow pins
      # it to this repo's publish.yml identity.
      - name: Verify SLSA build provenance attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.merge.outputs.digest }}
        run: |
          set -euo pipefail
          gh attestation verify "oci://${IMAGE_DIGEST_REF}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/publish.yml"
